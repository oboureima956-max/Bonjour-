name: NeuralOS Auto Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17 (recommandé Android moderne)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # 3️⃣ Permissions Gradle
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4️⃣ Build Debug (rapide)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 6️⃣ Build App Bundle (Google Play)
      - name: Build AAB
        run: ./gradlew bundleRelease

      # 7️⃣ Upload APK Debug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralOS-Debug
          path: app/build/outputs/apk/debug/*.apk

      # 8️⃣ Upload APK Release
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralOS-Release
          path: app/build/outputs/apk/release/*.apk

      # 9️⃣ Upload App Bundle (Play Store)
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: NeuralOS-AAB
          path: app/build/outputs/bundle/release/*.aab